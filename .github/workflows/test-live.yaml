# Scheduled live-API test workflow.
#
# Runs every Monday at 06:00 UTC, plus on-demand. Sets AMADEUS_LIVE_TESTS=true
# so that `skip_if_no_live_tests()` (see tests/testthat/helper-skips.R) does
# not skip the `test-*-live.R` files. These exercise real upstream APIs and
# are intentionally excluded from PR/CRAN runs.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

name: test-live

jobs:
  test-live:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
      NASA_EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
      AMADEUS_LIVE_TESTS: "true"
      NOT_CRAN: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pak
            any::testthat
            any::devtools
            any::rstac
            any::patrick
          needs: check

      - name: Run live tests only
        shell: Rscript {0}
        run: |
          options(testthat.progress.max_fails = 50)
          devtools::load_all(".")
          res <- testthat::test_dir(
            "tests/testthat",
            filter = "-live$",
            stop_on_failure = FALSE,
            reporter = testthat::SummaryReporter$new()
          )
          df <- as.data.frame(res)
          n_fail <- sum(df$failed)
          n_err  <- sum(df$error)
          cat(sprintf("\nLive tests: %d failed, %d error\n", n_fail, n_err))
          if (n_fail + n_err > 0) quit(status = 1)
